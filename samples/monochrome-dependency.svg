<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 550" role="img" aria-labelledby="title subtitle">
  <title id="title">Node.js Module Dependency Graph</title>
  <desc>Monochrome top-down dependency graph showing required and optional Node.js module relationships.</desc>
  <defs>
    <marker id="arrow-data" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#111827"/>
    </marker>
    <marker id="arrow-control" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#111827"/>
    </marker>
    <marker id="arrow-dependency" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#111827"/>
    </marker>
    <marker id="arrow-async" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#111827"/>
    </marker>
    <marker id="arrow-required" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#666666"/>
    </marker>
    <marker id="arrow-optional" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#999999"/>
    </marker>
  </defs>
  <style>
    :root {
      --canvas-bg: #ffffff;
      --node-fill: #ffffff;
      --node-stroke: #1f2937;
      --text-primary: #111827;
      --text-secondary: #374151;
      --text-title: #111827;
      --edge-data: #374151;
      --edge-control: #374151;
      --edge-dependency: #374151;
      --edge-async: #374151;
      --group-fill: #ffffff;
      --group-stroke: #9ca3af;
      --group-label: #374151;
    }

    svg {
      background: var(--canvas-bg);
      font-family: Georgia, Cambria, "Times New Roman", serif;
    }

    .diagram-title {
      fill: var(--text-title);
      font-size: 22px;
      font-weight: 700;
    }

    .node-shape {
      fill: var(--node-fill);
      stroke: var(--node-stroke);
      stroke-width: 1.5;
      filter: none;
    }

    .node-label {
      fill: var(--text-primary);
      font-size: 14px;
      font-weight: 600;
    }

    .node-sublabel,
    .edge-label {
      fill: var(--text-secondary);
      font-size: 12px;
      font-weight: 400;
    }

    .group-shape {
      fill: var(--group-fill);
      stroke: var(--group-stroke);
      stroke-width: 1.2;
      stroke-dasharray: 5,3;
    }

    .group-label {
      fill: var(--group-label);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .edge-data,
    .edge-control,
    .edge-dependency,
    .edge-async {
      fill: none;
      stroke-linecap: butt;
      stroke-linejoin: miter;
    }

    .edge-data { stroke: var(--edge-data); stroke-width: 1.5; marker-end: url(#arrow-data); }
    .edge-control { stroke: var(--edge-control); stroke-width: 1.5; marker-end: url(#arrow-control); }
    .edge-dependency { stroke: var(--edge-dependency); stroke-width: 1.5; stroke-dasharray: 6,3; marker-end: url(#arrow-dependency); }
    .edge-async { stroke: var(--edge-async); stroke-width: 1.5; stroke-dasharray: 2,3; marker-end: url(#arrow-async); }

    .node-accent,
    .group-divider {
      fill: none;
      stroke: var(--group-stroke);
      stroke-width: 1;
    }

    .group-title-bar {
      fill: #f3f4f6;
    }

    .dependency-node .node-shape {
      fill: #f0f0f0;
      stroke: #333333;
      stroke-width: 1.5;
    }

    .edge-required,
    .edge-optional {
      fill: none;
      stroke-linecap: butt;
      stroke-linejoin: miter;
    }

    .edge-required {
      stroke: #666666;
      stroke-width: 1.5;
      marker-end: url(#arrow-required);
    }

    .edge-optional {
      stroke: #999999;
      stroke-width: 1.5;
      stroke-dasharray: 6,3;
      marker-end: url(#arrow-optional);
    }

    .legend-panel {
      fill: #ffffff;
      fill-opacity: 0.92;
      stroke: #9ca3af;
      stroke-width: 1;
    }

    .legend-title {
      fill: var(--group-label);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .legend-text {
      fill: var(--text-secondary);
      font-size: 12px;
      font-weight: 400;
    }
  </style>
  <rect x="0" y="0" width="700" height="550" fill="#ffffff"/>

  <text id="subtitle" x="350" y="28" text-anchor="middle" class="diagram-title">Node.js Module Dependency Graph</text>
  <text x="350" y="52" text-anchor="middle" class="node-sublabel">Monochrome · Top-down static module relationships</text>

  <g>
    <path class="edge-required" d="M 330 126 V 152 H 180 V 172"/>
    <path class="edge-required" d="M 350 126 V 172"/>
    <path class="edge-optional" d="M 370 126 V 152 H 520 V 172"/>
    <path class="edge-required" d="M 240 198 H 282"/>
    <path class="edge-required" d="M 180 216 V 238 H 260 V 262"/>
    <path class="edge-required" d="M 350 216 V 238 H 440 V 262"/>
    <path class="edge-optional" d="M 410 198 H 452"/>
    <path class="edge-required" d="M 260 306 V 352"/>
    <path class="edge-optional" d="M 500 288 H 560 V 152 H 520 V 172"/>
    <path class="edge-required" d="M 440 306 V 352"/>
    <path class="edge-required" d="M 320 378 H 372"/>
  </g>

  <g class="node dependency-node" transform="translate(290,90)">
    <rect width="120" height="36" rx="6" ry="6" class="node-shape"/>
    <text x="60" y="18" text-anchor="middle" dominant-baseline="middle" class="node-label">app</text>
  </g>
  <g class="node dependency-node" transform="translate(120,180)">
    <rect width="120" height="36" rx="6" ry="6" class="node-shape"/>
    <text x="60" y="18" text-anchor="middle" dominant-baseline="middle" class="node-label">router</text>
  </g>
  <g class="node dependency-node" transform="translate(290,180)">
    <rect width="120" height="36" rx="6" ry="6" class="node-shape"/>
    <text x="60" y="18" text-anchor="middle" dominant-baseline="middle" class="node-label">auth</text>
  </g>
  <g class="node dependency-node" transform="translate(460,180)">
    <rect width="120" height="36" rx="6" ry="6" class="node-shape"/>
    <text x="60" y="18" text-anchor="middle" dominant-baseline="middle" class="node-label">config</text>
  </g>
  <g class="node dependency-node" transform="translate(200,270)">
    <rect width="120" height="36" rx="6" ry="6" class="node-shape"/>
    <text x="60" y="18" text-anchor="middle" dominant-baseline="middle" class="node-label">validation</text>
  </g>
  <g class="node dependency-node" transform="translate(380,270)">
    <rect width="120" height="36" rx="6" ry="6" class="node-shape"/>
    <text x="60" y="18" text-anchor="middle" dominant-baseline="middle" class="node-label">database</text>
  </g>
  <g class="node dependency-node" transform="translate(200,360)">
    <rect width="120" height="36" rx="6" ry="6" class="node-shape"/>
    <text x="60" y="18" text-anchor="middle" dominant-baseline="middle" class="node-label">utils</text>
  </g>
  <g class="node dependency-node" transform="translate(380,360)">
    <rect width="120" height="36" rx="6" ry="6" class="node-shape"/>
    <text x="60" y="18" text-anchor="middle" dominant-baseline="middle" class="node-label">logger</text>
  </g>

  <g class="legend" transform="translate(40,446)">
    <rect class="legend-panel" x="-12" y="-4" width="180" height="80" rx="8"/>
    <text class="legend-title" x="0" y="14">Legend</text>
    <line x1="0" y1="36" x2="40" y2="36" class="edge-required"/>
    <text class="legend-text" x="52" y="36" dominant-baseline="middle">required</text>
    <line x1="0" y1="60" x2="40" y2="60" class="edge-optional"/>
    <text class="legend-text" x="52" y="60" dominant-baseline="middle">optional</text>
  </g>
</svg>
