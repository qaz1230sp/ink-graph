<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 680" role="img" aria-labelledby="title">
  <title id="title">AI AGENT CAPABILITIES MIND MAP</title>
  <desc>Comic pop themed radial mind-map showing AI agent capabilities across perception, planning, action, and memory.</desc>
  <rect class="canvas-bg" x="0" y="0" width="100%" height="100%"/>
  <rect class="canvas-dots" x="0" y="0" width="100%" height="100%"/>
  <defs>
    <pattern id="comic-dots" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.5" fill="#3a3a3a"/>
    </pattern>

    <filter id="comic-shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feOffset dx="3" dy="3" in="SourceGraphic" result="offset"/>
      <feFlood flood-color="#000000" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="offset" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="comic-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" in="SourceGraphic" result="blur"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <marker id="arrow-data" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#4488ff"/>
    </marker>
    <marker id="arrow-control" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#ffffff"/>
    </marker>
    <marker id="arrow-dependency" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#ff4444"/>
    </marker>
    <marker id="arrow-async" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#44dd44"/>
    </marker>
  </defs>
  <style>
    :root {
      --canvas-bg: #2b2b2b;
      --canvas-dots: #3a3a3a;
      --node-fill: #ffffff;
      --node-stroke: #1a1a1a;
      --node-stroke-hover: #ff4444;
      --text-primary: #1a1a1a;
      --text-secondary: #555555;
      --text-title: #ffd700;
      --edge-data: #4488ff;
      --edge-control: #ffffff;
      --edge-dependency: #ff4444;
      --edge-async: #44dd44;
      --group-fill: rgba(255,215,0,0.08);
      --group-stroke: #1a1a1a;
      --group-label: #ffd700;
      --flow-duration: 2s;
    }

    svg {
      background: var(--canvas-bg);
      font-family: "Bangers", "Comic Neue", "Comic Sans MS", cursive;
    }

    .canvas-bg {
      fill: var(--canvas-bg);
    }

    .canvas-dots {
      fill: url(#comic-dots);
    }

    .diagram-title {
      fill: var(--text-title);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .node-shape {
      fill: var(--node-fill);
      stroke: var(--node-stroke);
      stroke-width: 3;
      filter: url(#comic-shadow);
    }

    .node-label {
      fill: var(--text-primary);
      font-size: 13px;
      font-weight: 700;
    }

    .node-sublabel,
    .edge-label {
      fill: var(--text-secondary);
      font-size: 11px;
      font-weight: 400;
    }

    .group-shape {
      fill: var(--group-fill);
      stroke: var(--group-stroke);
      stroke-width: 2.5;
      stroke-dasharray: 12,6;
    }

    .group-label {
      fill: var(--group-label);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .edge-data,
    .edge-control,
    .edge-dependency,
    .edge-async {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .edge-data { stroke: var(--edge-data); stroke-width: 2.5; marker-end: url(#arrow-data); }
    .edge-control { stroke: var(--edge-control); stroke-width: 2.5; marker-end: url(#arrow-control); }
    .edge-dependency { stroke: var(--edge-dependency); stroke-width: 2.5; stroke-dasharray: 8,4; marker-end: url(#arrow-dependency); }
    .edge-async { stroke: var(--edge-async); stroke-width: 2.5; stroke-dasharray: 4,4; marker-end: url(#arrow-async); }

    .edge-animated {
      stroke-dasharray: 12,6;
      animation: cg-edge-flow var(--flow-duration) linear infinite;
    }

    @keyframes cg-edge-flow {
      to { stroke-dashoffset: -36; }
    }
  </style>
  <style>
    .node-accent {
      fill: none;
      stroke: var(--group-stroke);
      stroke-width: 1.5;
    }

    .group-title-bar {
      fill: var(--group-fill);
    }

    .group-divider {
      stroke: var(--group-stroke);
      stroke-width: 1.5;
      stroke-dasharray: 4,4;
      opacity: 0.65;
    }

    .branch-edge {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .branch-perception-edge { stroke: #ff4444; }
    .branch-planning-edge { stroke: #4488ff; }
    .branch-action-edge { stroke: #44dd44; }
    .branch-memory-edge { stroke: #ff8800; }

    .center-node .node-shape {
      fill: #ffd700;
      stroke: #1a1a1a;
      stroke-width: 4;
    }

    .branch-node .node-shape {
      stroke: #1a1a1a;
      stroke-width: 3;
    }

    .leaf-node .node-shape {
      stroke: #1a1a1a;
      stroke-width: 2;
    }

    .branch-perception .node-shape { fill: #ff4444; }
    .branch-planning .node-shape { fill: #4488ff; }
    .branch-action .node-shape { fill: #44dd44; }
    .branch-memory .node-shape { fill: #ff8800; }

    .leaf-node.branch-perception .node-shape { fill: #ff7a7a; }
    .leaf-node.branch-planning .node-shape { fill: #76adff; }
    .leaf-node.branch-action .node-shape { fill: #76ef76; }
    .leaf-node.branch-memory .node-shape { fill: #ffb45a; }

    .center-node .node-label,
    .branch-node .node-label,
    .leaf-node .node-label {
      fill: #ffffff;
      paint-order: stroke;
      stroke: #1a1a1a;
      stroke-width: 1.4;
      stroke-linejoin: round;
      letter-spacing: 0.5px;
    }

    .center-node .node-label {
      font-size: 22px;
    }

    .branch-node .node-label {
      font-size: 16px;
    }

    .leaf-node .node-label {
      font-size: 12px;
    }

    .leaf-node.multiline .node-label {
      font-size: 9px;
      letter-spacing: 0.2px;
    }

    .legend-panel {
      fill: rgba(43,43,43,0.9);
      stroke: var(--group-label);
      stroke-width: 1.5;
    }

    .legend-title {
      fill: var(--group-label);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .legend-text {
      fill: var(--node-fill);
      font-size: 11px;
      font-weight: 400;
    }

    .legend-swatch {
      stroke: #1a1a1a;
      stroke-width: 2;
      filter: url(#comic-shadow);
    }

    .legend-perception { fill: #ff4444; }
    .legend-planning { fill: #4488ff; }
    .legend-action { fill: #44dd44; }
    .legend-memory { fill: #ff8800; }
  </style>

  <g class="edges">
    <path class="branch-edge branch-memory-edge" d="M 370 309 Q 290 250 229 221"/>
    <path class="branch-edge branch-perception-edge" d="M 450 315 Q 520 250 568 216"/>
    <path class="branch-edge branch-planning-edge" d="M 463 365 Q 535 390 574 430"/>
    <path class="branch-edge branch-action-edge" d="M 377 365 Q 310 400 266 430"/>

    <path class="branch-edge branch-memory-edge" d="M 180 185 Q 150 145 112 125"/>
    <path class="branch-edge branch-memory-edge" d="M 140 204 Q 124 186 115 205"/>
    <path class="branch-edge branch-memory-edge" d="M 188 221 Q 165 250 150 275"/>

    <path class="branch-edge branch-perception-edge" d="M 613 180 Q 650 145 676 130"/>
    <path class="branch-edge branch-perception-edge" d="M 650 203 Q 675 192 690 206"/>
    <path class="branch-edge branch-perception-edge" d="M 604 216 Q 635 252 659 290"/>

    <path class="branch-edge branch-planning-edge" d="M 629 430 Q 665 394 695 380"/>
    <path class="branch-edge branch-planning-edge" d="M 665 455 Q 680 450 695 459"/>
    <path class="branch-edge branch-planning-edge" d="M 614 466 Q 640 510 653 550"/>

    <path class="branch-edge branch-action-edge" d="M 207 430 Q 165 392 129 380"/>
    <path class="branch-edge branch-action-edge" d="M 175 454 Q 145 449 120 460"/>
    <path class="branch-edge branch-action-edge" d="M 222 466 Q 195 502 171 540"/>
  </g>

  <g class="nodes">
    <g class="node center-node" transform="translate(370,315)">
      <rect class="node-shape" width="100" height="50" rx="20" ry="20"/>
      <text class="node-label" x="50" y="25" text-anchor="middle" dominant-baseline="central">AI AGENT</text>
    </g>

    <g class="node branch-node branch-memory" transform="translate(140,185)">
      <rect class="node-shape" width="120" height="36" rx="14" ry="14"/>
      <text class="node-label" x="60" y="18" text-anchor="middle" dominant-baseline="central">MEMORY</text>
    </g>
    <g class="node branch-node branch-perception" transform="translate(530,180)">
      <rect class="node-shape" width="120" height="36" rx="14" ry="14"/>
      <text class="node-label" x="60" y="18" text-anchor="middle" dominant-baseline="central">PERCEPTION</text>
    </g>
    <g class="node branch-node branch-planning" transform="translate(545,430)">
      <rect class="node-shape" width="120" height="36" rx="14" ry="14"/>
      <text class="node-label" x="60" y="18" text-anchor="middle" dominant-baseline="central">PLANNING</text>
    </g>
    <g class="node branch-node branch-action" transform="translate(175,430)">
      <rect class="node-shape" width="120" height="36" rx="14" ry="14"/>
      <text class="node-label" x="60" y="18" text-anchor="middle" dominant-baseline="central">ACTION</text>
    </g>

    <g class="node leaf-node branch-memory" transform="translate(45,95)">
      <rect class="node-shape" width="100" height="30" rx="12" ry="12"/>
      <text class="node-label" x="50" y="15" text-anchor="middle" dominant-baseline="central">Short-term</text>
    </g>
    <g class="node leaf-node branch-memory" transform="translate(15,190)">
      <rect class="node-shape" width="100" height="30" rx="12" ry="12"/>
      <text class="node-label" x="50" y="15" text-anchor="middle" dominant-baseline="central">Long-term</text>
    </g>
    <g class="node leaf-node branch-memory" transform="translate(90,275)">
      <rect class="node-shape" width="100" height="30" rx="12" ry="12"/>
      <text class="node-label" x="50" y="15" text-anchor="middle" dominant-baseline="central">Retrieval</text>
    </g>

    <g class="node leaf-node branch-perception" transform="translate(645,100)">
      <rect class="node-shape" width="100" height="30" rx="12" ry="12"/>
      <text class="node-label" x="50" y="15" text-anchor="middle" dominant-baseline="central">Vision</text>
    </g>
    <g class="node leaf-node branch-perception" transform="translate(690,195)">
      <rect class="node-shape" width="100" height="30" rx="12" ry="12"/>
      <text class="node-label" x="50" y="15" text-anchor="middle" dominant-baseline="central">NLP</text>
    </g>
    <g class="node leaf-node branch-perception" transform="translate(620,290)">
      <rect class="node-shape" width="100" height="30" rx="12" ry="12"/>
      <text class="node-label" x="50" y="15" text-anchor="middle" dominant-baseline="central">Audio</text>
    </g>

    <g class="node leaf-node branch-planning multiline" transform="translate(665,350)">
      <rect class="node-shape" width="100" height="30" rx="12" ry="12"/>
      <text class="node-label" x="50" y="10" text-anchor="middle">
        <tspan x="50" dy="0">Goal</tspan>
        <tspan x="50" dy="10">Decomposition</tspan>
      </text>
    </g>
    <g class="node leaf-node branch-planning" transform="translate(695,450)">
      <rect class="node-shape" width="100" height="30" rx="12" ry="12"/>
      <text class="node-label" x="50" y="15" text-anchor="middle" dominant-baseline="central">Task Graph</text>
    </g>
    <g class="node leaf-node branch-planning" transform="translate(610,550)">
      <rect class="node-shape" width="100" height="30" rx="12" ry="12"/>
      <text class="node-label" x="50" y="15" text-anchor="middle" dominant-baseline="central">Strategy</text>
    </g>

    <g class="node leaf-node branch-action" transform="translate(55,350)">
      <rect class="node-shape" width="100" height="30" rx="12" ry="12"/>
      <text class="node-label" x="50" y="15" text-anchor="middle" dominant-baseline="central">Tool Use</text>
    </g>
    <g class="node leaf-node branch-action" transform="translate(20,450)">
      <rect class="node-shape" width="100" height="30" rx="12" ry="12"/>
      <text class="node-label" x="50" y="15" text-anchor="middle" dominant-baseline="central">Code Gen</text>
    </g>
    <g class="node leaf-node branch-action" transform="translate(110,540)">
      <rect class="node-shape" width="100" height="30" rx="12" ry="12"/>
      <text class="node-label" x="50" y="15" text-anchor="middle" dominant-baseline="central">API Calls</text>
    </g>
  </g>

  <g class="legend" transform="translate(338,32)">
    <rect class="legend-panel" x="-12" y="-4" width="176" height="128" rx="8"/>
    <text class="legend-title" x="0" y="14">Legend</text>
    <rect class="legend-swatch legend-perception" x="0" y="27" width="18" height="18" rx="5"/>
    <text class="legend-text" x="30" y="36" dominant-baseline="middle">Perception</text>
    <rect class="legend-swatch legend-planning" x="0" y="51" width="18" height="18" rx="5"/>
    <text class="legend-text" x="30" y="60" dominant-baseline="middle">Planning</text>
    <rect class="legend-swatch legend-action" x="0" y="75" width="18" height="18" rx="5"/>
    <text class="legend-text" x="30" y="84" dominant-baseline="middle">Action</text>
    <rect class="legend-swatch legend-memory" x="0" y="99" width="18" height="18" rx="5"/>
    <text class="legend-text" x="30" y="108" dominant-baseline="middle">Memory</text>
  </g>
</svg>
