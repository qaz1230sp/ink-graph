<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 840" role="img" aria-labelledby="title desc">
  <title id="title">UFO³ SYSTEM ARCHITECTURE</title>
  <desc id="desc">Retro terminal themed layered architecture diagram showing orchestration, agent core, and execution groups.</desc>
  <rect class="canvas-bg" x="0" y="0" width="820" height="840"/>
  <defs>
    <pattern id="scanlines" width="820" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0.5" x2="820" y2="0.5" stroke="#00ff41" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" in="SourceGraphic" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow-data" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#00ff41"/>
    </marker>
    <marker id="arrow-control" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#00cc33"/>
    </marker>
    <marker id="arrow-dependency" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#ffaa00"/>
    </marker>
  </defs>
  <style>
    :root {
      --canvas-bg: #0a0a0a;
      --node-fill: #0a0a0a;
      --node-stroke: #00ff41;
      --text-primary: #00ff41;
      --text-secondary: #00cc33;
      --text-title: #00ff41;
      --edge-data: #00ff41;
      --edge-control: #00cc33;
      --edge-dependency: #ffaa00;
      --group-fill: rgba(0,255,65,0.04);
      --group-stroke: #00ff41;
      --group-label: #00ff41;
      --flow-duration: 2s;
    }

    svg {
      background: var(--canvas-bg);
      font-family: "IBM Plex Mono", "Courier New", monospace;
      shape-rendering: geometricPrecision;
      text-rendering: geometricPrecision;
    }

    .canvas-bg {
      fill: var(--canvas-bg);
    }

    .diagram-title {
      fill: var(--text-title);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      filter: url(#text-glow);
    }

    .subtitle {
      fill: var(--text-secondary);
      font-size: 12px;
      letter-spacing: 1.2px;
      filter: url(#text-glow);
    }

    .group-shape {
      fill: var(--group-fill);
      stroke: var(--group-stroke);
      stroke-width: 1.5;
      stroke-dasharray: 6 4;
    }

    .group-divider {
      stroke: var(--group-stroke);
      stroke-width: 1;
      stroke-dasharray: 6 4;
      opacity: 0.75;
    }

    .group-label {
      fill: var(--group-label);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      filter: url(#text-glow);
    }

    .node-shape {
      fill: var(--node-fill);
      stroke: var(--node-stroke);
      stroke-width: 1.5;
      animation: crt-flicker 3s ease-in-out infinite;
    }

    .node-label {
      fill: var(--text-primary);
      font-size: 13px;
      font-weight: 600;
      filter: url(#text-glow);
    }

    .node-sublabel {
      fill: var(--text-secondary);
      font-size: 11px;
      filter: url(#text-glow);
    }

    .edge-control,
    .edge-data,
    .edge-dependency {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .edge-control {
      stroke: var(--edge-control);
      stroke-width: 1.5;
      marker-end: url(#arrow-control);
    }

    .edge-data {
      stroke: var(--edge-data);
      stroke-width: 1.5;
      marker-end: url(#arrow-data);
    }

    .edge-dependency {
      stroke: var(--edge-dependency);
      stroke-width: 1.5;
      stroke-dasharray: 10 6;
      marker-end: url(#arrow-dependency);
    }

    .edge-animated {
      stroke-dasharray: 8 4;
      animation: cg-edge-flow var(--flow-duration) linear infinite;
    }

    .edge-no-marker {
      marker-start: none;
      marker-end: none;
    }

    .edge-bidirectional {
      marker-start: url(#arrow-dependency);
      marker-end: url(#arrow-dependency);
    }

    .junction-control {
      fill: var(--edge-control);
    }

    .junction-data {
      fill: var(--edge-data);
    }

    .legend-panel {
      fill: rgba(10,10,10,0.92);
      stroke: var(--group-stroke);
      stroke-width: 1;
    }

    .legend-title {
      fill: var(--text-primary);
      font-size: 12px;
      font-weight: 700;
      filter: url(#text-glow);
    }

    .legend-text {
      fill: var(--text-primary);
      font-size: 11px;
      filter: url(#text-glow);
    }

    .scanline-overlay {
      fill: url(#scanlines);
      pointer-events: none;
    }

    @keyframes cg-edge-flow {
      to { stroke-dashoffset: -24; }
    }

    @keyframes crt-flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.92; }
    }
  </style>

  <text x="410" y="28" text-anchor="middle" class="diagram-title">UFO³ SYSTEM ARCHITECTURE</text>
  <text x="410" y="52" text-anchor="middle" class="subtitle">RETRO TERMINAL · LAYERED SERVICE ARCHITECTURE</text>

  <g class="groups">
    <rect class="group-shape" x="190" y="96" width="440" height="260" rx="4"/>
    <line class="group-divider" x1="190" y1="128" x2="630" y2="128"/>
    <text class="group-label" x="210" y="117">ORCHESTRATION</text>

    <rect class="group-shape" x="190" y="384" width="440" height="116" rx="4"/>
    <line class="group-divider" x1="190" y1="416" x2="630" y2="416"/>
    <text class="group-label" x="210" y="405">AGENT CORE</text>

    <rect class="group-shape" x="70" y="544" width="680" height="116" rx="4"/>
    <line class="group-divider" x1="70" y1="576" x2="750" y2="576"/>
    <text class="group-label" x="90" y="565">EXECUTION</text>
  </g>

  <g class="edges">
    <path class="edge-control edge-no-marker" d="M 410 192 V 244"/>
    <circle class="junction-control" cx="410" cy="244" r="3"/>
    <path class="edge-control edge-no-marker" d="M 290 244 H 530"/>
    <path class="edge-control" d="M 290 244 V 284"/>
    <path class="edge-control" d="M 530 244 V 284"/>
    <path class="edge-control" d="M 290 336 V 428"/>

    <path class="edge-data edge-animated edge-no-marker" d="M 290 480 V 522"/>
    <circle class="junction-data" cx="290" cy="522" r="3"/>
    <path class="edge-data edge-animated edge-no-marker" d="M 170 522 H 650"/>
    <path class="edge-data edge-animated" d="M 170 522 V 588"/>
    <path class="edge-data edge-animated" d="M 410 522 V 588"/>
    <path class="edge-data edge-animated" d="M 650 522 V 588"/>

    <path class="edge-dependency edge-bidirectional" d="M 618 314 H 676 V 458 H 618"/>
  </g>

  <g class="nodes">
    <rect class="node-shape" x="330" y="148" width="160" height="44" rx="2"/>
    <text class="node-label" x="410" y="166" text-anchor="middle">Galaxy Server</text>
    <text class="node-sublabel" x="410" y="180" text-anchor="middle">cloud orchestrator</text>

    <rect class="node-shape" x="210" y="292" width="160" height="44" rx="2"/>
    <text class="node-label" x="290" y="310" text-anchor="middle" textLength="136" lengthAdjust="spacingAndGlyphs">Constellation DAG</text>
    <text class="node-sublabel" x="290" y="324" text-anchor="middle">task graph</text>

    <rect class="node-shape" x="450" y="292" width="160" height="44" rx="2"/>
    <text class="node-label" x="530" y="310" text-anchor="middle">Knowledge Store</text>
    <text class="node-sublabel" x="530" y="324" text-anchor="middle">memory</text>

    <rect class="node-shape" x="210" y="436" width="160" height="44" rx="2"/>
    <text class="node-label" x="290" y="454" text-anchor="middle">AppAgent</text>
    <text class="node-sublabel" x="290" y="468" text-anchor="middle" textLength="136" lengthAdjust="spacingAndGlyphs">application controller</text>

    <rect class="node-shape" x="450" y="436" width="160" height="44" rx="2"/>
    <text class="node-label" x="530" y="454" text-anchor="middle" textLength="136" lengthAdjust="spacingAndGlyphs">Experience Manager</text>
    <text class="node-sublabel" x="530" y="468" text-anchor="middle">learning</text>

    <rect class="node-shape" x="90" y="596" width="160" height="44" rx="2"/>
    <text class="node-label" x="170" y="614" text-anchor="middle">UI Executor</text>
    <text class="node-sublabel" x="170" y="628" text-anchor="middle">GUI</text>

    <rect class="node-shape" x="330" y="596" width="160" height="44" rx="2"/>
    <text class="node-label" x="410" y="614" text-anchor="middle">CLI Executor</text>
    <text class="node-sublabel" x="410" y="628" text-anchor="middle">command line</text>

    <rect class="node-shape" x="570" y="596" width="160" height="44" rx="2"/>
    <text class="node-label" x="650" y="614" text-anchor="middle">API Executor</text>
    <text class="node-sublabel" x="650" y="628" text-anchor="middle">programmatic</text>
  </g>

  <g class="legend" transform="translate(60,708)">
    <rect class="legend-panel" x="-12" y="-4" width="184" height="104" rx="2"/>
    <text class="legend-title" x="0" y="14">Legend</text>
    <line x1="0" y1="36" x2="40" y2="36" class="edge-control"/>
    <text class="legend-text" x="52" y="36" dominant-baseline="middle">control</text>
    <line x1="0" y1="60" x2="40" y2="60" class="edge-data edge-animated"/>
    <text class="legend-text" x="52" y="60" dominant-baseline="middle">data</text>
    <line x1="4" y1="84" x2="36" y2="84" class="edge-dependency edge-bidirectional"/>
    <text class="legend-text" x="52" y="84" dominant-baseline="middle">dependency</text>
  </g>

  <rect class="scanline-overlay" x="0" y="0" width="820" height="840"/>
</svg>
